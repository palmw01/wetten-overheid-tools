<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MCP Debugger</title>
  <link rel="icon" type="image/x-icon" href="/favicon.ico" />
  <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon.png" />
  <link rel="manifest" href="/site.webmanifest" />
  <meta name="theme-color" content="#030712" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    html, body {
      height: 100%;
      margin: 0;
      overflow: hidden;
      font-family: 'JetBrains Mono', monospace;
      background: #030712;
      color: #f1f5f9;
    }
    body { display: flex; flex-direction: column; }

    /* Markdown */
    .md h1,.md h2,.md h3 { color:#7dd3fc; font-weight:600; margin:.6em 0 .3em; }
    .md h1 { font-size:1.05em; }
    .md h2 { font-size:.95em; }
    .md h3 { font-size:.9em; }
    .md p  { margin:.35em 0; line-height:1.6; }
    .md ul,.md ol { margin:.35em 0; padding-left:1.5em; }
    .md ul { list-style: disc; }
    .md ol { list-style: decimal; }
    .md li { margin:.15em 0; }
    .md code { background:#1e293b; color:#86efac; padding:.1em .35em; border-radius:3px; font-size:.85em; }
    .md pre  { background:#0f172a; border:1px solid #1e293b; border-radius:6px; padding:.6em .9em; overflow-x:auto; margin:.4em 0; }
    .md pre code { background:none; padding:0; }
    .md a    { color:#38bdf8; text-decoration:underline; }
    .md strong { color:#e2e8f0; font-weight:600; }
    .md em   { color:#94a3b8; }
    .md hr   { border-color:#1e293b; margin:.6em 0; }
    .md blockquote { border-left:3px solid #334155; padding-left:.7em; color:#94a3b8; margin:.4em 0; }
    .md table { border-collapse:collapse; width:100%; margin:.4em 0; font-size:.85em; }
    .md th  { background:#1e293b; color:#7dd3fc; padding:.35em .6em; text-align:left; }
    .md td  { border-top:1px solid #1e293b; padding:.25em .6em; }

    /* JSON */
    .jk { color:#7dd3fc; }
    .js { color:#86efac; }
    .jn { color:#fbbf24; }
    .jb { color:#f472b6; }
    .jl { color:#94a3b8; }

    pre { white-space:pre-wrap; word-break:break-word; margin:0; }

    .tab-on  { color:#fff; border-bottom:2px solid #3b82f6; }
    .tab-off { color:#64748b; border-bottom:2px solid transparent; cursor:pointer; }
    .tab-off:hover { color:#94a3b8; }

    ::-webkit-scrollbar { width:4px; height:4px; }
    ::-webkit-scrollbar-track { background:transparent; }
    ::-webkit-scrollbar-thumb { background:#334155; border-radius:2px; }

    /* ── Main layout ─────────────────────────────────────────────────── */
    #main-area {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
    }
    #panes-row {
      flex: 1;
      min-height: 0;
      display: flex;
    }
    #req-pane, #resp-pane {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    #stream-pane {
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      height: 7rem;
    }

    /* ── Resize handles (desktop only) ──────────────────────────────── */
    .rh {
      background: #1e293b;
      flex-shrink: 0;
      transition: background 0.1s;
      z-index: 10;
    }
    .rh:hover, .rh.active { background: #3b82f6; }
    .rh-v { width: 4px; cursor: col-resize; }
    .rh-h { height: 4px; cursor: row-resize; }

    /* ── Mobile tab bar ──────────────────────────────────────────────── */
    #mobile-tabbar { display: none; }

    @media (max-width: 767px) {
      .rh { display: none !important; }

      #mobile-tabbar {
        display: flex;
        flex-shrink: 0;
        background: #111827;
        border-top: 1px solid #1f2937;
      }
      .mob-tab {
        flex: 1;
        padding: .55rem 0;
        font-size: .7rem;
        text-align: center;
        cursor: pointer;
        color: #64748b;
        border-top: 2px solid transparent;
        background: transparent;
        font-family: inherit;
      }
      .mob-tab.active {
        color: #fff;
        border-top-color: #3b82f6;
      }
    }

    /* ── BwbNode structuurboom ───────────────────────────────────────── */
    details > summary { list-style: none; }
    details > summary::-webkit-details-marker { display: none; }
    .tree-arrow { display: inline-block; transition: transform 0.12s; }
    details:not([open]) > summary .tree-arrow { transform: rotate(-90deg); }
    .tree-node > summary:hover,
    .tree-leaf:hover { background: #0f172a; border-radius: 4px; }
    .tree-body { border-left: 1px solid #1e293b; margin-left: 14px; }
    .tree-id { opacity: 0; transition: opacity .15s; }
    .tree-node > summary:hover .tree-id,
    .tree-leaf:hover .tree-id { opacity: 1; }
    /* Boom-tabel */
    .boom-table { border-collapse: collapse; font-size: .72rem; }
    .boom-table th { background: #1e293b; color: #7dd3fc; padding: .25rem .5rem; border: 1px solid #334155; text-align: left; }
    .boom-table td { border: 1px solid #1e293b; padding: .2rem .5rem; color: #cbd5e1; }
    /* Toggle buttons */
    .boom-view-btn { font-size:.7rem; padding:.2rem .6rem; border-radius:4px; cursor:pointer; border:none; font-family:inherit; }
    .boom-view-on  { background:#1d4ed8; color:#fff; }
    .boom-view-off { background:#1e293b; color:#64748b; }
    .boom-view-off:hover { color:#94a3b8; }
  </style>
</head>

<body>

<!-- HEADER -->
<header class="flex-none flex items-center justify-between px-4 py-2 bg-gray-900 border-b border-gray-800">
  <div class="flex items-center gap-2">
    <span class="font-bold text-white tracking-tight text-sm">MCP Debugger</span>
    <span class="text-xs text-gray-600">v1.2</span>
  </div>
  <div class="flex items-center gap-2">
    <span id="status-dot" class="w-2 h-2 rounded-full bg-gray-600 inline-block"></span>
    <span id="status-text" class="text-xs text-gray-400">Verbinden</span>
  </div>
</header>

<!-- TOOLBAR -->
<div class="flex-none bg-gray-900 border-b border-gray-800 px-4 py-2 space-y-2">
  <div class="flex flex-wrap items-center gap-2">
    <label class="text-xs text-gray-500 uppercase tracking-widest">Tool</label>
    <select id="tool-select"
      class="flex-1 min-w-0 bg-gray-800 border border-gray-700 rounded px-3 py-1.5 text-sm text-white focus:outline-none focus:ring-1 focus:ring-blue-500">
      <option value="">— laden —</option>
    </select>
    <button id="info-btn"
      title="Toelichting tonen/verbergen"
      class="flex-none w-7 h-7 flex items-center justify-center rounded border text-xs transition-colors bg-gray-800 border-gray-700 text-gray-500 hover:text-gray-300 hover:border-gray-500">
      ⓘ
    </button>
    <button id="run-btn"
      class="flex-none px-4 py-1.5 bg-blue-600 hover:bg-blue-500 disabled:opacity-40 disabled:cursor-not-allowed text-white text-sm rounded font-medium whitespace-nowrap">
      Uitvoeren
    </button>
  </div>

  <p id="tool-description" class="hidden text-xs text-gray-500 italic leading-relaxed border-l-2 border-gray-700 pl-2"></p>

  <div id="form-container" class="hidden">
    <div class="flex items-center justify-between pt-1.5 pb-0.5 border-t border-gray-800 mt-1">
      <span class="text-xs text-gray-500 uppercase tracking-widest">Parameters</span>
      <button id="form-collapse-btn"
        title="Invoervelden inklappen"
        class="flex items-center justify-center w-5 h-5 text-gray-600 hover:text-gray-400 text-xs"
        onclick="toggleForm()">▾</button>
    </div>
    <div id="form-fields" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-2 mt-1"></div>
  </div>
</div>

<!-- MAIN AREA -->
<div id="main-area">

  <!-- PANES ROW: Request + verticale handle + Response -->
  <div id="panes-row">

    <!-- Request -->
    <div id="req-pane" class="border-r border-gray-800">
      <!-- Request pane tabs -->
      <div class="flex-none px-4 py-0 bg-gray-900 border-b border-gray-800 flex items-center">
        <button id="req-tab-btn-formatted" class="tab-on text-xs py-1.5 mr-4 transition-colors"
          onclick="switchReqTab('formatted')">Opgemaakt</button>
        <button id="req-tab-btn-json" class="tab-off text-xs py-1.5 transition-colors"
          onclick="switchReqTab('json')">JSON</button>
      </div>
      <!-- Opgemaakte request -->
      <div id="request-formatted" class="flex-1 overflow-auto text-sm bg-gray-950 md leading-relaxed">
        <div class="p-4 text-xs text-gray-600">— nog geen aanvraag —</div>
      </div>
      <!-- Ruwe JSON request -->
      <pre id="request-panel" class="hidden flex-1 overflow-auto p-3 text-xs text-gray-500 bg-gray-950">— nog geen aanvraag —</pre>
    </div>

    <!-- Verticale resize handle (desktop) -->
    <div class="rh rh-v" id="handle-v"></div>

    <!-- Response -->
    <div id="resp-pane">
      <div class="flex-none px-4 py-0 bg-gray-900 border-b border-gray-800 flex items-center justify-between">
        <div class="flex gap-4">
          <button id="tab-btn-formatted" class="tab-on text-xs py-1.5 transition-colors" onclick="switchTab('formatted')">Opgemaakt</button>
          <button id="tab-btn-raw"       class="tab-off text-xs py-1.5 transition-colors" onclick="switchTab('raw')">JSON</button>
          <button id="tab-btn-tree"      class="tab-off text-xs py-1.5 transition-colors" onclick="switchTab('tree')">Boom</button>
        </div>
        <span id="duration-badge" class="hidden text-xs px-2 py-0.5 rounded bg-gray-800 text-gray-400"></span>
      </div>
      <!-- Opgemaakt tab -->
      <div id="response-formatted" class="flex-1 overflow-auto p-3 text-sm bg-gray-950 md leading-relaxed">
        <span class="text-gray-600 text-xs">— nog geen response —</span>
      </div>
      <!-- JSON tab -->
      <pre id="response-raw" class="hidden flex-1 overflow-auto p-3 text-xs text-gray-300 bg-gray-950">— nog geen response —</pre>
      <!-- Boom tab -->
      <div id="response-tree" class="hidden flex-1 overflow-auto p-2 bg-gray-950"></div>
    </div>

  </div>

  <!-- Horizontale resize handle (desktop) -->
  <div class="rh rh-h" id="handle-h"></div>

  <!-- Stream -->
  <div id="stream-pane" class="border-t border-gray-800">
    <div class="flex-none px-4 py-1 bg-gray-900 border-b border-gray-800 flex items-center justify-between">
      <div class="flex items-center gap-2">
        <span class="text-xs font-semibold text-gray-400 uppercase tracking-wider">Stream</span>
        <button id="stream-collapse-btn"
          title="Minimaliseren/uitklappen"
          class="hidden md:flex items-center justify-center w-4 h-4 text-gray-600 hover:text-gray-400 text-xs"
          onclick="toggleStream()">▾</button>
      </div>
      <button id="clear-btn" class="text-xs text-gray-700 hover:text-gray-400">leeg</button>
    </div>
    <div id="sse-log" class="flex-1 overflow-auto px-3 py-1 text-xs space-y-0.5 bg-gray-950"></div>
  </div>

</div>

<!-- MOBILE TAB BAR -->
<nav id="mobile-tabbar">
  <button class="mob-tab active" data-target="resp" onclick="setMobTab(this,'resp')">Respons</button>
  <button class="mob-tab"        data-target="req"    onclick="setMobTab(this,'req')">Request</button>
  <button class="mob-tab"        data-target="stream" onclick="setMobTab(this,'stream')">Stream</button>
</nav>

<script>
marked.setOptions({ breaks: true, gfm: true });

let currentTool = null, tools = [], currentTab = 'formatted', lastResult = null;
let currentReqTab = 'formatted';
let lastRequestData = null; // { tool, args }
const isMobile = () => window.innerWidth < 768;

const $ = id => document.getElementById(id);
const statusDot     = $('status-dot');
const statusText    = $('status-text');
const toolSelect    = $('tool-select');
const runBtn        = $('run-btn');
const formContainer = $('form-container');
const formFields    = $('form-fields');
const toolDesc      = $('tool-description');
const reqFmt        = $('request-formatted');
const reqPanel      = $('request-panel');
const respFmt       = $('response-formatted');
const respRaw       = $('response-raw');
const respTree      = $('response-tree');
const durBadge      = $('duration-badge');
const sseLog        = $('sse-log');
const reqPane       = $('req-pane');
const respPane      = $('resp-pane');
const streamPane    = $('stream-pane');
const panesRow      = $('panes-row');
const handleH       = $('handle-h');
const handleV       = $('handle-v');

// ── Mobile tabs ───────────────────────────────────────────────────────────
let activeMobTab = 'resp';

function setMobTab(btn, target) {
  activeMobTab = target;
  document.querySelectorAll('.mob-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  applyMobileLayout();
}

function applyMobileLayout() {
  if (!isMobile()) return;

  panesRow.style.flex = '';
  reqPane.style.flex = '';
  respPane.style.flex = '';

  if (activeMobTab === 'stream') {
    panesRow.style.display = 'none';
    handleH.style.display = 'none';
    streamPane.style.display = 'flex';
    streamPane.style.flex = '1';
    streamPane.style.height = 'auto';
  } else {
    panesRow.style.display = 'flex';
    panesRow.style.flex = '1';
    handleH.style.display = 'none';
    streamPane.style.display = 'none';
    streamPane.style.flex = '';
    streamPane.style.height = '';

    if (activeMobTab === 'req') {
      reqPane.style.display = 'flex';
      reqPane.style.flex = '1';
      respPane.style.display = 'none';
    } else {
      respPane.style.display = 'flex';
      respPane.style.flex = '1';
      reqPane.style.display = 'none';
    }
  }
}

function resetDesktopLayout() {
  [panesRow, reqPane, respPane, streamPane, handleH, handleV].forEach(el => {
    el.style.cssText = '';
  });
  streamPane.style.height = streamCollapsed ? '' : '7rem';
}

window.addEventListener('resize', () => {
  if (isMobile()) applyMobileLayout();
  else resetDesktopLayout();
});

if (isMobile()) applyMobileLayout();

// ── Info / description toggle ─────────────────────────────────────────────
$('info-btn').addEventListener('click', () => {
  const nowHidden = toolDesc.classList.toggle('hidden');
  const btn = $('info-btn');
  if (nowHidden) { btn.style.color = ''; btn.style.borderColor = ''; }
  else { btn.style.color = '#38bdf8'; btn.style.borderColor = '#38bdf8'; }
});

// ── Stream collapse (desktop) ─────────────────────────────────────────────
let streamCollapsed = false;
const STREAM_DEFAULT_H = 112;

function toggleStream() {
  streamCollapsed = !streamCollapsed;
  const logEl = $('sse-log');
  const btn = $('stream-collapse-btn');
  if (streamCollapsed) {
    logEl.style.display = 'none';
    streamPane.style.height = '';
    btn.textContent = '▸'; btn.title = 'Uitklappen';
  } else {
    logEl.style.display = '';
    streamPane.style.height = streamPane._savedH ? streamPane._savedH + 'px' : STREAM_DEFAULT_H + 'px';
    btn.textContent = '▾'; btn.title = 'Minimaliseren';
  }
}

// ── Form collapse ─────────────────────────────────────────────────────────
let formCollapsed = false;
function toggleForm() {
  formCollapsed = !formCollapsed;
  const btn = $('form-collapse-btn');
  const fields = $('form-fields');
  if (formCollapsed) { fields.style.display = 'none'; btn.textContent = '▸'; btn.title = 'Invoervelden uitklappen'; }
  else { fields.style.display = ''; btn.textContent = '▾'; btn.title = 'Invoervelden inklappen'; }
}

// ── Request pane tabs ─────────────────────────────────────────────────────
function switchReqTab(tab) {
  currentReqTab = tab;
  $('req-tab-btn-formatted').className = (tab==='formatted'?'tab-on':'tab-off') + ' text-xs py-1.5 mr-4 transition-colors';
  $('req-tab-btn-json').className       = (tab==='json'?'tab-on':'tab-off')      + ' text-xs py-1.5 transition-colors';
  reqFmt.classList.toggle('hidden', tab !== 'formatted');
  reqPanel.classList.toggle('hidden', tab !== 'json');
}

// ── Response tabs ─────────────────────────────────────────────────────────
function switchTab(tab) {
  currentTab = tab;
  ['formatted','raw','tree'].forEach(t => {
    $(`tab-btn-${t}`).className = (tab===t?'tab-on':'tab-off') + ' text-xs py-1.5 transition-colors';
  });
  respFmt.classList.toggle('hidden', tab !== 'formatted');
  respRaw.classList.toggle('hidden', tab !== 'raw');
  respTree.classList.toggle('hidden', tab !== 'tree');
  if (lastResult !== null) renderResponse(lastResult, false);
}

// ── SSE ───────────────────────────────────────────────────────────────────
function connectSSE() {
  const es = new EventSource('/api/events');
  es.addEventListener('connected', () => {
    statusDot.className = 'w-2 h-2 rounded-full bg-green-500 inline-block';
    statusText.textContent = 'Verbonden';
    log('system', 'SSE verbonden');
  });
  es.addEventListener('request',  e => { const d=JSON.parse(e.data); log('request',  `${d.tool}  ${JSON.stringify(d.args)}`); });
  es.addEventListener('response', e => { const d=JSON.parse(e.data); log('response', `${d.durationMs}ms  ${d.error?'fout':'ok'}`); });
  es.addEventListener('ping',     () => log('ping', '-'));
  es.onerror = () => {
    statusDot.className = 'w-2 h-2 rounded-full bg-red-500 inline-block';
    statusText.textContent = 'Verbroken';
    log('system', 'SSE verbroken');
  };
}

// ── Tools ─────────────────────────────────────────────────────────────────
async function loadTools() {
  try {
    const r = await fetch('/api/tools');
    tools = await r.json();
    toolSelect.innerHTML = '';
    tools.forEach(t => {
      const o = document.createElement('option');
      o.value = t.name; o.textContent = t.name;
      toolSelect.appendChild(o);
    });
    if (tools.length) selectTool(tools[0].name);
  } catch(e) {
    toolSelect.innerHTML = '<option>— laden mislukt —</option>';
  }
}

function selectTool(name) {
  currentTool = tools.find(t => t.name === name) ?? null;
  if (!currentTool) return;
  toolDesc.textContent = currentTool.description ?? '';
  if (!toolDesc.classList.contains('hidden')) {
    toolDesc.classList.add('hidden');
    $('info-btn').style.color = '';
    $('info-btn').style.borderColor = '';
  }
  const infoBtn = $('info-btn');
  infoBtn.disabled = !currentTool.description;
  infoBtn.style.opacity = currentTool.description ? '' : '0.3';
  buildForm(currentTool.inputSchema);
  updatePreview();
}
toolSelect.addEventListener('change', () => selectTool(toolSelect.value));

// ── Formulier ─────────────────────────────────────────────────────────────
function buildForm(schema) {
  formFields.innerHTML = '';
  const props = schema?.properties ?? {};
  const req = new Set(schema?.required ?? []);
  const entries = Object.entries(props);
  if (!entries.length) { formContainer.classList.add('hidden'); return; }
  formContainer.classList.remove('hidden');

  const base = 'bg-gray-800 border border-gray-700 rounded px-2 py-1 text-sm text-white focus:outline-none focus:ring-1 focus:ring-blue-500';

  entries.forEach(([key, def]) => {
    const wrap = document.createElement('div');
    wrap.className = 'flex flex-col gap-1';

    const lbl = document.createElement('label');
    lbl.htmlFor = `f-${key}`;
    lbl.className = 'text-xs text-gray-400';
    lbl.innerHTML = key + (req.has(key) ? ' <span class="text-red-400">*</span>' : '');

    const isDate = key === 'peildatum' || (def.description ?? '').includes('YYYY-MM-DD');
    let el;

    if (def.type === 'boolean') {
      wrap.className = 'flex flex-row items-center gap-2';
      el = document.createElement('input');
      el.type = 'checkbox'; el.checked = def.default !== false;
      el.className = 'w-4 h-4 accent-blue-500';
      el.dataset.type = 'boolean';
    } else if (def.type === 'number' || def.type === 'integer') {
      el = document.createElement('input');
      el.type = 'number'; el.className = base; el.dataset.type = def.type;
      el.placeholder = def.description ?? key;
      if (def.default !== undefined) el.value = def.default;
    } else if (def.enum) {
      el = document.createElement('select');
      el.className = base; el.dataset.type = 'enum';
      def.enum.forEach(v => {
        const o = document.createElement('option');
        o.value = v; o.textContent = v;
        if (v === def.default) o.selected = true;
        el.appendChild(o);
      });
    } else {
      el = document.createElement('input');
      el.type = isDate ? 'date' : 'text'; el.className = base; el.dataset.type = 'string';
      if (!isDate) el.placeholder = def.description ?? key;
      if (def.default !== undefined) el.value = def.default;
      else if (isDate) el.value = new Date().toISOString().slice(0, 10);
    }

    el.id = `f-${key}`; el.dataset.key = key;
    el.addEventListener('input', updatePreview);
    el.addEventListener('change', updatePreview);
    wrap.appendChild(lbl); wrap.appendChild(el);
    formFields.appendChild(wrap);
  });
}

function collectArgs() {
  const args = {};
  formFields.querySelectorAll('[data-key]').forEach(el => {
    const k = el.dataset.key, t = el.dataset.type;
    if (t === 'boolean')         { args[k] = el.checked; }
    else if (t === 'number')     { if (el.value !== '') args[k] = parseFloat(el.value); }
    else if (t === 'integer')    { if (el.value !== '') args[k] = parseInt(el.value); }
    else                         { if (el.value !== '') args[k] = el.value; }
  });
  return args;
}

function updatePreview() {
  if (!currentTool) return;
  const args = collectArgs();
  lastRequestData = { tool: currentTool.name, args };
  // JSON tab
  renderJSON(reqPanel, { tool: currentTool.name, args });
  // Opgemaakt tab
  reqFmt.innerHTML = renderFormattedRequest(currentTool.name, args);
}

// ── Opgemaakte request ────────────────────────────────────────────────────
function renderFormattedRequest(toolName, args) {
  const entries = Object.entries(args).filter(([,v]) => v !== '' && v !== null && v !== undefined);
  const rows = entries.map(([k, v]) => `
    <div class="flex gap-3 items-start py-1.5 border-b border-gray-800 last:border-0">
      <span class="text-xs text-gray-500 w-28 flex-shrink-0 pt-0.5">${esc(k)}</span>
      <span class="text-sm text-white font-mono break-all">${esc(String(v))}</span>
    </div>`).join('');

  return `<div class="p-4 space-y-3">
    <div>
      <div class="text-xs text-gray-600 uppercase tracking-widest mb-1">Tool</div>
      <div class="text-sky-400 font-semibold text-sm">${esc(toolName)}</div>
    </div>
    ${rows ? `<div>${rows}</div>` : '<div class="text-xs text-gray-600 italic">Geen parameters ingevuld</div>'}
  </div>`;
}

// ── Result formatters (Opgemaakt tab) ─────────────────────────────────────
function stripLidPrefix(tekst) {
  return tekst.replace(/^\d+(?:\.\d+)?\s{1,4}/, '');
}

function pill(tekst) {
  return `<span class="inline-block px-1.5 py-0.5 rounded text-xs bg-gray-800 text-gray-400 font-mono">${esc(tekst)}</span>`;
}

function renderArtikel(r) {
  const breadcrumb = (r.structuurpad ?? [])
    .map(s => `<span>${esc(s)}</span>`)
    .join('<span class="mx-1 text-gray-700">›</span>');

  const ledenHtml = (r.leden ?? []).map(lid => `
    <div class="flex gap-3 py-2 border-b border-gray-800 last:border-0">
      <div class="flex-shrink-0 w-10 text-right text-xs text-sky-500 font-mono pt-0.5">${lid.lid ? 'lid ' + esc(lid.lid) : ''}</div>
      <div class="text-sm text-gray-200 leading-relaxed md">${marked.parse(stripLidPrefix(lid.tekst))}</div>
    </div>`).join('');

  const waarschuwing = r.waarschuwing
    ? `<div class="mt-3 px-3 py-2 rounded border border-amber-700 bg-amber-950 text-amber-300 text-xs">${esc(r.waarschuwing)}</div>`
    : '';

  return `
    <div class="p-4 space-y-3">
      <div class="flex items-start justify-between gap-4">
        <div class="min-w-0">
          ${breadcrumb ? `<div class="text-xs text-gray-600 mb-1 leading-relaxed">${breadcrumb}</div>` : ''}
          <div class="text-sky-400 text-xs font-medium">${esc(r.citeertitel ?? '')}</div>
          <div class="text-white text-xl font-bold mt-0.5">Artikel ${esc(r.artikel ?? '')}</div>
        </div>
        <div class="flex-shrink-0 text-xs text-gray-600 font-mono">${esc(r.versiedatum ?? '')}</div>
      </div>
      <hr class="border-gray-800"/>
      <div>${ledenHtml || `<div class="text-sm text-gray-300">${esc(r.tekst ?? '')}</div>`}</div>
      <hr class="border-gray-800"/>
      <div class="text-xs text-gray-700 font-mono">${esc(r.bronreferentie ?? '')}</div>
      ${waarschuwing}
    </div>`;
}

function renderZoek(r) {
  const items = (r.regelingen ?? []).map(reg => {
    const meta = [reg.type, reg.ministerie, reg.rechtsgebied].filter(Boolean).join(' · ');
    return `
      <div class="py-2.5 border-b border-gray-800 last:border-0">
        <div class="flex items-start justify-between gap-3">
          <div class="text-sm text-white font-medium">${esc(reg.titel ?? reg.bwbId)}</div>
          <div class="flex-shrink-0">${pill(reg.bwbId ?? '')}</div>
        </div>
        ${meta ? `<div class="text-xs text-gray-500 mt-0.5">${esc(meta)}</div>` : ''}
        ${reg.geldigVanaf ? `<div class="text-xs text-gray-700 mt-0.5">geldig vanaf ${esc(reg.geldigVanaf)}</div>` : ''}
      </div>`;
  }).join('');

  const dubbel = (r.dubbeleVerwijderd ?? 0) > 0
    ? ` <span class="text-gray-600 text-xs">(${r.dubbeleVerwijderd} dubbel verwijderd)</span>` : '';

  return `
    <div class="p-4 space-y-3">
      <div>
        <div class="text-xs text-gray-600 mb-1">Zoekquery</div>
        <div class="text-sm text-gray-300 font-mono">${esc(r.query ?? '')}</div>
        <div class="text-xs text-gray-500 mt-1">${r.totaal ?? 0} regelingen${dubbel}</div>
      </div>
      <hr class="border-gray-800"/>
      <div>${items || '<div class="text-xs text-gray-600">Geen resultaten</div>'}</div>
    </div>`;
}

function renderZoekterm(r) {
  const artikelen = (r.artikelen ?? []).map(art => {
    const ledenTags = (art.leden ?? []).map(l => pill('lid ' + l)).join(' ');
    return `
      <div class="py-2.5 border-b border-gray-800 last:border-0">
        <div class="flex items-center justify-between gap-2">
          <div class="text-sm text-sky-300 font-medium">Artikel ${esc(art.artikel)}</div>
          <div class="text-xs text-gray-500">${art.aantalTreffers}×</div>
        </div>
        ${ledenTags ? `<div class="mt-1 flex flex-wrap gap-1">${ledenTags}</div>` : ''}
      </div>`;
  }).join('');

  return `
    <div class="p-4 space-y-3">
      <div>
        <div class="text-xs text-gray-600 mb-1">${esc(r.wet ?? '')} · ${esc(r.versiedatum ?? '')}</div>
        <div class="flex items-baseline gap-2 flex-wrap">
          <span class="text-white font-semibold">"${esc(r.zoekterm ?? '')}"</span>
          <span class="text-xs text-gray-500">${r.totaalTreffers ?? 0} treffers in ${r.aantalArtikelen ?? 0} artikelen</span>
        </div>
      </div>
      <hr class="border-gray-800"/>
      <div>${artikelen || '<div class="text-xs text-gray-600">Geen treffers</div>'}</div>
    </div>`;
}

// ── Structuur: opgemaakt (Opgemaakt tab) ──────────────────────────────────
function renderStructuur(r) {
  if (r.fout) return renderGeneric(r);
  const norm = r.normalized;

  // Header
  const header = `
    <div class="p-4 border-b border-gray-800 flex items-start justify-between">
      <div>
        <div class="text-sky-400 text-xs font-medium">${esc(r.citeertitel ?? '')}</div>
        <div class="text-white text-xl font-bold mt-0.5 font-mono">${esc(r.bwbId ?? '')}</div>
      </div>
      <div class="text-xs text-gray-600 font-mono">${esc(r.versiedatum ?? '')}</div>
    </div>`;

  let body = '';
  if (norm && (norm.type === 'artikel' || norm.type === 'circulaire_divisie')) {
    // Gefilterd op één artikel: toon het volledig
    body = renderNormArtikel(norm);
  } else if (norm) {
    // Volledig document: toon samenvatting
    const children = norm.children || [];
    const artCount = countArtikelen(r.raw);
    body = `<div class="p-4 space-y-3">
      <div class="flex gap-4 flex-wrap">
        <div class="text-xs text-gray-500">type <span class="text-sky-400 ml-1">${esc(norm.type || '')}</span></div>
        ${artCount > 0 ? `<div class="text-xs text-gray-500">artikelen <span class="text-amber-400 ml-1">${artCount}</span></div>` : ''}
        <div class="text-xs text-gray-500">kinderen <span class="text-gray-300 ml-1">${children.length}</span></div>
      </div>
      <div class="text-xs text-gray-600 border-l-2 border-gray-800 pl-3 italic">
        Open de <span class="text-blue-400">Boom</span>-tab voor de volledige interactieve structuurboom.
      </div>
    </div>`;
  }

  return header + body;
}

function countArtikelen(node, count = 0) {
  if (!node || typeof node !== 'object') return count;
  if (node.type === 'artikel' || node.type === 'circulaire_divisie') count++;
  for (const c of (node.children || [])) count = countArtikelen(c, count);
  return count;
}

function renderNormArtikel(norm) {
  const ledenHtml = (norm.leden ?? []).map(lid => `
    <div class="flex gap-3 py-2 border-b border-gray-800 last:border-0">
      <div class="flex-shrink-0 w-10 text-right text-xs text-sky-500 font-mono pt-0.5">${lid.lidnr ? 'lid ' + esc(lid.lidnr) : ''}</div>
      <div class="flex-1 min-w-0">
        <div class="text-sm text-gray-200 leading-relaxed">${renderContentItems(lid.content || [])}</div>
        ${(lid.children || []).map(c => renderNormChild(c)).join('')}
      </div>
    </div>`).join('');

  return `<div class="p-4 space-y-3">
    <div>
      ${norm.titel ? `<div class="text-gray-500 text-xs mb-0.5">${esc(norm.titel)}</div>` : ''}
      <div class="text-white text-lg font-bold">Artikel ${esc(norm.nr || '')}</div>
    </div>
    <hr class="border-gray-800"/>
    <div>${ledenHtml || '<div class="text-xs text-gray-600">Geen inhoud</div>'}</div>
  </div>`;
}

function renderNormChild(node) {
  if (!node) return '';
  if (node.type === 'lijst') return renderNormLijst(node);
  if (node.type === 'table') {
    const g = (node.groups || [])[0];
    if (!g) return '';
    const rows = [...(g.head || []), ...(g.body || [])].slice(0, 6);
    const tableRows = rows.map((row, i) => {
      const cells = (row.cells || []).map(c =>
        `<td class="border border-gray-800 px-2 py-1 text-xs text-gray-300">${esc(c.tekst || '')}</td>`
      ).join('');
      return `<tr ${i === 0 && g.head.length > 0 ? 'class="bg-gray-800"' : ''}>${cells}</tr>`;
    }).join('');
    return `<div class="mt-2 overflow-x-auto"><table class="boom-table">${tableRows}</table></div>`;
  }
  return '';
}

function renderNormLijst(lijst) {
  const items = (lijst.items || []).map(item => `
    <div class="flex gap-2 py-0.5 text-sm text-gray-300">
      <span class="text-sky-500 font-mono flex-shrink-0 min-w-5">${esc(item.label)}</span>
      <span class="leading-relaxed">${renderContentItems(item.content || [])}</span>
    </div>`).join('');
  return `<div class="ml-2 mt-1 border-l border-gray-800 pl-3 space-y-0.5">${items}</div>`;
}

// ── Inline content renderen ────────────────────────────────────────────────
function renderContentItem(item) {
  if (typeof item === 'string') return esc(item);
  if (item.type === 'intref' || item.type === 'extref') {
    const href = item.target ? esc(item.target) : '#';
    return `<a class="text-cyan-400 hover:underline" href="${href}" title="${href}" target="_blank">${esc(item.label || item.target || item.type)}</a>`;
  }
  if (item.type === 'nadruk') {
    const inner = (item.content || []).map(renderContentItem).join('');
    return item.nadrukType === 'vet'
      ? `<strong class="text-white font-semibold">${inner}</strong>`
      : `<em class="text-gray-300">${inner}</em>`;
  }
  if (item.type === 'sup') return `<sup class="text-xs">${(item.content||[]).map(renderContentItem).join('')}</sup>`;
  if (item.type === 'sub') return `<sub class="text-xs">${(item.content||[]).map(renderContentItem).join('')}</sub>`;
  if (item.type === 'br') return '<br>';
  const inner = (item.content || []).map(renderContentItem).join('');
  return `<span class="text-gray-500">[${esc(item.type)}${inner ? ':' + inner : ''}]</span>`;
}

function renderContentItems(items) {
  return (items || []).map(renderContentItem).join('');
}

// ── Structuurboom (Boom tab) ──────────────────────────────────────────────

/** Kleuren per node-type in de boom. */
function nodeTypeColor(type) {
  const map = {
    artikel:'text-sky-400', enig_artikel:'text-sky-400', circulaire_divisie:'text-sky-500',
    lid:'text-amber-400',
    al:'text-green-400', tekst:'text-green-500',
    lijst:'text-orange-400', li:'text-orange-500',
    hoofdstuk:'text-purple-400', afdeling:'text-purple-400',
    paragraaf:'text-purple-500', sub_paragraaf:'text-purple-500',
    deel:'text-purple-300', boek:'text-purple-300', titeldeel:'text-purple-300',
    table:'text-rose-400', tgroup:'text-rose-500',
    thead:'text-rose-400', tbody:'text-rose-400', tfoot:'text-rose-400',
    row:'text-rose-500', entry:'text-rose-600', colspec:'text-rose-700',
    intref:'text-cyan-500', extref:'text-cyan-500',
    nadruk:'text-yellow-500', sup:'text-yellow-600', sub:'text-yellow-600',
    toestand:'text-gray-500',
  };
  return map[type] || 'text-gray-400';
}

const BOOM_MAX_DEPTH = 25;

/**
 * Rendert één BwbNode of NormalizedNode als een <details>/<summary>-boom.
 * Werkt met zowel RAW (children + content) als NORMALIZED (leden + items + groups + children).
 */
function renderBwbTree(node, depth = 0) {
  if (!node || typeof node !== 'object' || depth > BOOM_MAX_DEPTH) return '';

  const type   = node.type || '?';
  const color  = nodeTypeColor(type);
  const meta   = node.metadata || {};
  const nr     = node.nr     || meta.nr    || meta.lidnr || meta.linr || '';
  const titel  = node.titel  || meta.titel || '';
  const id     = node.id     || '';

  const children = node.children || [];
  const content  = node.content;            // BwbNode mixed content
  const leden    = node.leden;              // NormalizedArtikel
  const items    = node.items;              // NormalizedLijst
  const groups   = node.groups;            // NormalizedTable
  const tekst    = node.tekst || '';       // NormalizedLid / NormalizedLeaf

  const hasChildren = children.length > 0;
  const hasContent  = Array.isArray(content) && content.length > 0;
  const hasLeden    = Array.isArray(leden) && leden.length > 0;
  const hasItems    = Array.isArray(items) && items.length > 0;
  const hasGroups   = Array.isArray(groups) && groups.length > 0;
  const isExpandable = hasChildren || hasContent || hasLeden || hasItems || hasGroups;

  const indent = `style="margin-left:${depth * 14}px"`;

  // Samenvatting-regel
  const head = [
    `<span class="${color} text-xs font-semibold">${esc(type)}</span>`,
    nr    ? `<span class="text-amber-300 text-xs font-mono ml-1">${esc(nr)}</span>` : '',
    titel ? `<span class="text-gray-400 text-xs ml-1">${esc(titel.length > 55 ? titel.slice(0, 55) + '…' : titel)}</span>` : '',
    (!nr && !titel && meta.label) ? `<span class="text-gray-600 text-xs ml-1">${esc(meta.label)}</span>` : '',
    tekst && !hasContent && !hasLeden ? `<span class="text-gray-600 text-xs ml-2 italic">${esc(tekst.length > 60 ? tekst.slice(0, 60) + '…' : tekst)}</span>` : '',
  ].join('');
  const idSpan = id ? `<span class="tree-id text-gray-700 text-xs font-mono ml-2">${esc(id)}</span>` : '';

  if (!isExpandable) {
    return `<div class="tree-leaf flex items-center py-0.5 px-1" ${indent}>
      <span class="text-gray-700 text-xs mr-1 flex-shrink-0">·</span>
      ${head}${idSpan}
    </div>`;
  }

  // Bepaal of de details standaard open zijn
  const openByDefault = depth <= 1 ||
    type === 'artikel' || type === 'circulaire_divisie' || type === 'lid';

  let body = '';

  // 1. Mixed content (al, entry)
  if (hasContent) {
    body += `<div class="ml-4 px-2 py-1 text-xs text-gray-300 leading-relaxed border-l border-gray-800">
      ${renderContentItems(content)}
    </div>`;
  }

  // 2. NormalizedArtikel leden
  if (hasLeden) {
    for (const lid of leden) body += renderBwbTree(lid, depth + 1);
  }

  // 3. NormalizedLijst items
  if (hasItems) {
    for (const item of items) body += renderBwbTree(item, depth + 1);
  }

  // 4. NormalizedTable tgroepen
  if (hasGroups) {
    for (const g of groups) body += renderBoomTableGroup(g, depth + 1);
  }

  // 5. Structurele kinderen
  for (const child of children) body += renderBwbTree(child, depth + 1);

  return `<details ${openByDefault ? 'open' : ''} class="tree-node">
    <summary class="flex items-center py-0.5 px-1 cursor-pointer rounded" ${indent}>
      <span class="tree-arrow mr-0.5 text-gray-600 text-xs flex-shrink-0">▾</span>
      ${head}${idSpan}
    </summary>
    <div class="tree-body">${body}</div>
  </details>`;
}

/** CALS tgroup als compacte HTML-tabel. */
function renderBoomTableGroup(g, depth) {
  const indent = `style="margin-left:${depth * 14}px"`;
  const allRows = [...(g.head || []), ...(g.body || [])];
  if (!allRows.length) return '';

  const tableHtml = allRows.slice(0, 8).map((row, i) => {
    const isHead = i < (g.head || []).length;
    const cells = (row.cells || []).map(c => {
      const rs = c.rowspan > 1 ? ` rowspan="${c.rowspan}"` : '';
      const cs = c.colspan > 1 ? ` colspan="${c.colspan}"` : '';
      const tag = isHead ? 'th' : 'td';
      return `<${tag}${rs}${cs}>${esc(c.tekst || '')}</${tag}>`;
    }).join('');
    return `<tr>${cells}</tr>`;
  }).join('');

  return `<details class="tree-node">
    <summary class="flex items-center py-0.5 px-1 cursor-pointer rounded" ${indent}>
      <span class="tree-arrow mr-0.5 text-gray-600 text-xs flex-shrink-0">▾</span>
      <span class="text-rose-400 text-xs font-semibold">tgroup</span>
      <span class="text-gray-600 text-xs ml-1">${g.cols} kol · ${(g.head||[]).length} header + ${(g.body||[]).length} rijen</span>
    </summary>
    <div class="tree-body ml-4 overflow-x-auto p-2">
      <table class="boom-table">${tableHtml}</table>
      ${allRows.length > 8 ? `<div class="text-xs text-gray-700 mt-1">… ${allRows.length - 8} meer rijen verborgen</div>` : ''}
    </div>
  </details>`;
}

/** Rendert de volledige Boom-tab voor een structuur-resultaat. */
function renderStructuurBoom(r) {
  const norm = r.normalized;
  const raw  = r.raw;
  if (!norm && !raw) return '<div class="text-gray-700 text-xs p-4">Geen structuurdata.</div>';

  return `<div class="p-2 space-y-2">
    <div class="flex items-center gap-2 flex-wrap sticky top-0 bg-gray-950 pb-1.5 border-b border-gray-800 mb-1">
      <button class="boom-view-btn boom-view-on" id="boom-btn-norm"
        onclick="setBoomView('normalized')">NORMALIZED</button>
      <button class="boom-view-btn boom-view-off" id="boom-btn-raw"
        onclick="setBoomView('raw')">RAW</button>
      <span class="text-xs text-gray-600">${esc(r.citeertitel || r.bwbId || '')}</span>
      <span class="text-xs text-gray-700 font-mono">${esc(r.versiedatum || '')}</span>
    </div>
    <div id="boom-content" class="font-mono text-xs leading-relaxed">
      ${renderBwbTree(norm)}
    </div>
  </div>`;
}

/** Wisselt tussen RAW en NORMALIZED in de Boom-tab. */
function setBoomView(view) {
  if (!lastResult || (!lastResult.raw && !lastResult.normalized)) return;
  const node = view === 'raw' ? lastResult.raw : lastResult.normalized;
  const content = $('boom-content');
  if (content) content.innerHTML = renderBwbTree(node);
  const btnNorm = $('boom-btn-norm');
  const btnRaw  = $('boom-btn-raw');
  if (btnNorm) { btnNorm.className = `boom-view-btn ${view==='normalized'?'boom-view-on':'boom-view-off'}`; }
  if (btnRaw)  { btnRaw.className  = `boom-view-btn ${view==='raw'?'boom-view-on':'boom-view-off'}`; }
}

// ── Generic fallback ──────────────────────────────────────────────────────
function renderGeneric(r) {
  if (r && typeof r === 'object' && r.fout) {
    return `<div class="p-4 text-red-400 text-sm">${esc(r.fout)}</div>`;
  }
  return `<div class="p-4 space-y-1">` +
    Object.entries(r ?? {}).map(([k, v]) =>
      `<div class="flex gap-2 text-xs">
        <span class="text-sky-500 flex-shrink-0 w-36 truncate">${esc(k)}</span>
        <span class="text-gray-300 font-mono">${esc(typeof v === 'object' ? JSON.stringify(v) : String(v))}</span>
      </div>`
    ).join('') + `</div>`;
}

function formatResult(result) {
  if (result === null || result === undefined)
    return '<span class="text-gray-600 text-xs p-4">Leeg resultaat</span>';
  if (typeof result === 'string') return marked.parse(result);
  if (typeof result !== 'object') return `<pre class="p-4 text-xs text-gray-300">${esc(String(result))}</pre>`;
  if (result.fout) return renderGeneric(result);
  // Structuurboom (wettenbank_structuur)
  if (result.raw !== undefined && result.normalized !== undefined) return renderStructuur(result);
  // Artikel
  if (result.citeertitel && result.leden !== undefined) return renderArtikel(result);
  // Zoekterm
  if (result.zoekterm !== undefined && result.artikelen !== undefined) return renderZoekterm(result);
  // Zoek
  if (result.regelingen !== undefined) return renderZoek(result);
  return renderGeneric(result);
}

// ── Response renderen ─────────────────────────────────────────────────────
function renderResponse(result, store = true) {
  if (store) lastResult = result;

  // Opgemaakt tab
  respFmt.innerHTML = formatResult(result);

  // JSON tab
  respRaw.innerHTML = highlight(JSON.stringify(result, null, 2));

  // Boom tab
  if (result && result.raw !== undefined && result.normalized !== undefined) {
    respTree.innerHTML = renderStructuurBoom(result);
  } else {
    respTree.innerHTML = '<div class="text-gray-700 text-xs p-4">Geen structuurboom — gebruik wettenbank_structuur.</div>';
  }
}

// ── Uitvoeren ─────────────────────────────────────────────────────────────
runBtn.addEventListener('click', async () => {
  if (!currentTool) return;
  runBtn.disabled = true; runBtn.textContent = 'Bezig...';
  respFmt.innerHTML = '<span class="text-gray-600 text-xs">wachten...</span>';
  respRaw.textContent = 'wachten...';
  respTree.innerHTML = '<div class="text-gray-700 text-xs p-4">Wachten op response...</div>';
  durBadge.classList.add('hidden');

  if (isMobile()) {
    const btn = document.querySelector('.mob-tab[data-target="resp"]');
    if (btn) setMobTab(btn, 'resp');
  }

  const payload = { tool: currentTool.name, args: collectArgs() };
  const t0 = Date.now();
  try {
    const r = await fetch('/api/call', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(payload) });
    const data = await r.json();
    const ms = Date.now() - t0;
    if (data.error) {
      const msg = typeof data.error === 'string' ? data.error : (data.error.message ?? JSON.stringify(data.error));
      respFmt.innerHTML = `<div class="text-red-400 text-xs p-4">Fout: ${esc(msg)}</div>`;
      respRaw.textContent = JSON.stringify(data.error, null, 2);
      respTree.innerHTML = `<div class="text-red-400 text-xs p-4">Fout: ${esc(msg)}</div>`;
      durBadge.className = 'text-xs px-2 py-0.5 rounded bg-red-900 text-red-400';
    } else {
      renderResponse(data.result);
      durBadge.className = 'text-xs px-2 py-0.5 rounded bg-green-900 text-green-400';
    }
    durBadge.textContent = `${ms}ms`;
    durBadge.classList.remove('hidden');
  } catch(e) {
    respFmt.innerHTML = `<div class="text-red-400 text-xs p-4">Fout: ${esc(e.message)}</div>`;
  } finally {
    runBtn.disabled = false; runBtn.textContent = 'Uitvoeren';
  }
});

// ── SSE log ───────────────────────────────────────────────────────────────
function log(type, msg) {
  const colors = { system:'text-gray-600', request:'text-blue-400', response:'text-green-400', ping:'text-gray-700' };
  const ts = new Date().toLocaleTimeString('nl-NL', { hour12:false });
  const line = document.createElement('div');
  line.className = colors[type] ?? 'text-gray-400';
  line.textContent = `${ts}  [${type.padEnd(8)}]  ${msg}`;
  sseLog.appendChild(line);
  sseLog.scrollTop = sseLog.scrollHeight;
}
$('clear-btn').addEventListener('click', () => sseLog.innerHTML = '');

// ── Desktop resize handles ────────────────────────────────────────────────
(function initResize() {
  let dragV = false, startX, startW;
  handleV.addEventListener('pointerdown', e => {
    if (isMobile()) return;
    dragV = true; startX = e.clientX;
    startW = reqPane.getBoundingClientRect().width;
    handleV.classList.add('active');
    document.body.style.cursor = 'col-resize';
    document.body.style.userSelect = 'none';
    handleV.setPointerCapture(e.pointerId);
  });
  handleV.addEventListener('pointermove', e => {
    if (!dragV) return;
    const totalW = panesRow.getBoundingClientRect().width - 4;
    const newW = Math.max(80, Math.min(totalW - 80, startW + (e.clientX - startX)));
    reqPane.style.flex = 'none';
    reqPane.style.width = newW + 'px';
    respPane.style.flex = '1';
    respPane.style.width = '';
  });
  handleV.addEventListener('pointerup', () => {
    dragV = false; handleV.classList.remove('active');
    document.body.style.cursor = '';
    document.body.style.userSelect = '';
  });

  let dragH = false, startY, startH;
  handleH.addEventListener('pointerdown', e => {
    if (isMobile()) return;
    if (streamCollapsed) return;
    dragH = true; startY = e.clientY;
    startH = streamPane.getBoundingClientRect().height;
    handleH.classList.add('active');
    document.body.style.cursor = 'row-resize';
    document.body.style.userSelect = 'none';
    handleH.setPointerCapture(e.pointerId);
  });
  handleH.addEventListener('pointermove', e => {
    if (!dragH) return;
    const newH = Math.max(32, startH - (e.clientY - startY));
    streamPane._savedH = newH;
    streamPane.style.height = newH + 'px';
  });
  handleH.addEventListener('pointerup', () => {
    dragH = false; handleH.classList.remove('active');
    document.body.style.cursor = '';
    document.body.style.userSelect = '';
  });
})();

// ── Helpers ───────────────────────────────────────────────────────────────
function renderJSON(el, v) { el.innerHTML = highlight(JSON.stringify(v, null, 2)); }
function highlight(s) {
  return esc(s).replace(
    /("(?:\\u[0-9a-fA-F]{4}|\\[^u]|[^\\"])*"(?:\s*:)?|\b(?:true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+-]?\d+)?)/g,
    m => {
      let c='jn';
      if (/^"/.test(m)) c = /:$/.test(m) ? 'jk' : 'js';
      else if (/true|false/.test(m)) c='jb';
      else if (/null/.test(m)) c='jl';
      return `<span class="${c}">${m}</span>`;
    }
  );
}
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

connectSSE();
loadTools();
