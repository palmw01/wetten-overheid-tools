version: "3.9"

services:
  mcp-debugger:
    image: ghcr.io/palmw01/wetten-overheid-tools:latest
    container_name: mcp-debugger
    restart: unless-stopped
    environment:
      TZ: Europe/Amsterdam
    security_opt:
      - no-new-privileges:true
    ports:
      - "3001:3000"
    volumes:
      - /volume1/docker/wetten-overheid-tools/config:/app/config
      - /volume1/docker/wetten-overheid-tools/logs:/app/logs
    networks:
      - internal

networks:
  internal:
    external: true
    name: homeinfra_internal