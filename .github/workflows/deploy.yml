name: Build & Push MCP Debugger

on:
  push:
    branches: [master]
    paths:
      - "mcp-debugger/**"
      - "wettenbank-mcp/src/**"
  workflow_dispatch:

jobs:
  build-push:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./mcp-debugger/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/wetten-overheid-tools:latest
